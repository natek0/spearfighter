<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Spear Prototype — Phase 0 Combat Feel</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0e1116; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; touch-action:none; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  /* HUD */
  #hud { position:fixed; inset:0; pointer-events:none; color:#eaf0f6; }
  #crosshair { position:absolute; left:50%; top:50%; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; background:#eaf0f6; box-shadow:0 0 0 1px rgba(0,0,0,.5); opacity:.85; }
  #crosshair.flash { background:#ffd24a; box-shadow:0 0 10px 3px rgba(255,210,74,.7); }
  #hits { position:absolute; top:14px; left:16px; font-size:15px; font-weight:600; letter-spacing:.02em; text-shadow:0 1px 3px rgba(0,0,0,.7); }
  #hitpop { position:absolute; top:50%; left:50%; transform:translate(-50%,-140%); font-size:22px; font-weight:800; color:#ffd24a; text-shadow:0 2px 6px rgba(0,0,0,.8); opacity:0; transition:opacity .1s; }
  #mode { position:absolute; top:14px; right:16px; font-size:12px; color:#8fa3b8; text-shadow:0 1px 2px rgba(0,0,0,.7); }

  /* charge bar */
  #chargeWrap { position:absolute; left:50%; bottom:64px; transform:translateX(-50%); width:180px; height:10px; background:rgba(255,255,255,.12); border-radius:6px; overflow:hidden; opacity:0; transition:opacity .08s; }
  #chargeFill { height:100%; width:0%; background:linear-gradient(90deg,#5fb0ff,#ffd24a); border-radius:6px; }
  #chargeWrap.on { opacity:1; }

  #hint { position:absolute; left:0; right:0; bottom:14px; text-align:center; font-size:12px; color:#8fa3b8; text-shadow:0 1px 2px rgba(0,0,0,.7); padding:0 16px; }

  /* touch controls */
  .touchOnly { display:none; }
  #joyBase { position:absolute; width:120px; height:120px; margin:-60px 0 0 -60px; border-radius:50%; border:2px solid rgba(255,255,255,.18); background:rgba(255,255,255,.05); pointer-events:none; opacity:0; }
  #joyStick { position:absolute; width:54px; height:54px; margin:-27px 0 0 -27px; border-radius:50%; background:rgba(255,255,255,.25); pointer-events:none; opacity:0; }
  #btnAttack { position:absolute; right:26px; bottom:40px; width:104px; height:104px; border-radius:50%; background:radial-gradient(circle at 50% 40%, rgba(255,210,74,.30), rgba(255,210,74,.12)); border:2px solid rgba(255,210,74,.5); }
  #btnJump { position:absolute; right:150px; bottom:70px; width:76px; height:76px; border-radius:50%; background:rgba(95,176,255,.14); border:2px solid rgba(95,176,255,.5); }
  .tbtn { pointer-events:auto; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#eaf0f6; text-shadow:0 1px 2px rgba(0,0,0,.7); }

  /* start overlay */
  #overlay { position:fixed; inset:0; background:rgba(10,13,18,.92); color:#eaf0f6; display:flex; align-items:center; justify-content:center; text-align:center; z-index:10; pointer-events:auto; }
  #overlay .card { max-width:520px; padding:28px 30px; }
  #overlay h1 { font-size:22px; margin-bottom:6px; }
  #overlay .sub { color:#8fa3b8; font-size:13px; margin-bottom:18px; }
  #overlay .keys { text-align:left; font-size:14px; line-height:1.7; margin:0 auto 20px; display:inline-block; }
  #overlay .keys b { color:#ffd24a; }
  #overlay .go { display:inline-block; margin-top:6px; padding:12px 26px; border-radius:10px; background:#ffd24a; color:#161a20; font-weight:800; font-size:15px; cursor:pointer; }
  #overlay .note { margin-top:16px; font-size:11px; color:#5f7286; }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <div id="crosshair"></div>
  <div id="hits">Hits: 0</div>
  <div id="hitpop">HIT</div>
  <div id="mode"></div>
  <div id="chargeWrap"><div id="chargeFill"></div></div>
  <div id="hint"></div>
  <div id="joyBase" class="touchOnly"></div>
  <div id="joyStick" class="touchOnly"></div>
  <div id="btnAttack" class="tbtn touchOnly">THROW<br>/JAB</div>
  <div id="btnJump" class="tbtn touchOnly">JUMP</div>
</div>

<div id="overlay">
  <div class="card">
    <h1>Spear Prototype — Phase 0</h1>
    <div class="sub">A throwaway feel-test. Lob arced spears over the wall at the moving dummy.</div>
    <div class="keys" id="keys"></div>
    <div class="go" id="goBtn">Start</div>
    <div class="note">This is a disposable prototype for testing combat feel — not the real game. Open it on your phone's browser to feel the actual touch controls.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

// ---------- device / mode ----------
var isTouch = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) || ('ontouchstart' in window);

// ---------- tunables (all the "feel" lives here) ----------
var EYE = 1.7;
var MOVE_SPEED = 6.0;
var GRAVITY = -22.0;
var JUMP_SPEED = 8.0;
var PLAYER_RADIUS = 0.45;

var TAP_MAX = 0.15;          // hold shorter than this = jab, not throw
var CHARGE_FULL = 1.15;      // hold time (after tap threshold) for full power
var THROW_MIN = 15.0;        // m/s at zero charge
var THROW_MAX = 34.0;        // m/s at full charge
var SPEAR_GRAVITY = -15.0;   // arc strength
var JAB_RANGE = 3.0;
var JAB_DOT = Math.cos(38 * Math.PI/180);

var LOOK_DESK = 0.0022;      // rad per px (mouse)
var LOOK_TOUCH = 0.0045;     // rad per px (drag)
var AIM_SENS_MULT = 0.42;    // sensitivity reduction while charging a throw
var MAX_SPEARS = 14;

// ---------- three.js setup ----------
var app = document.getElementById('app');
var renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
app.appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2230);
scene.fog = new THREE.Fog(0x1a2230, 40, 90);

var camera = new THREE.PerspectiveCamera(74, window.innerWidth/window.innerHeight, 0.1, 500);

var hemi = new THREE.HemisphereLight(0xcfe4ff, 0x2a2f3a, 0.9);
scene.add(hemi);
var sun = new THREE.DirectionalLight(0xfff2d6, 0.9);
sun.position.set(12, 22, 8);
scene.add(sun);

// ground + grid for depth reference
var groundMat = new THREE.MeshStandardMaterial({ color:0x2c3646, roughness:1, metalness:0 });
var ground = new THREE.Mesh(new THREE.PlaneGeometry(120,120), groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);
var grid = new THREE.GridHelper(120, 60, 0x3f4d61, 0x333f50);
grid.position.y = 0.01;
scene.add(grid);

// ---------- obstacles (visual + collision + spear-stick) ----------
var obstacles = []; // { mesh, box:THREE.Box3 }
function addBox(x,y,z,sx,sy,sz,color){
  var m = new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),
                         new THREE.MeshStandardMaterial({ color:color, roughness:.95 }));
  m.position.set(x,y,z);
  scene.add(m);
  var box = new THREE.Box3().setFromObject(m);
  obstacles.push({ mesh:m, box:box });
  return m;
}
// cover wall between spawn and dummy — forces arced lobs (top ~2.6m, above eye height)
addBox(0, 1.3, 0, 12, 2.6, 0.7, 0x475264);
// pillars for depth reference + stick targets
addBox(-8, 1.6, -3, 1.2, 3.2, 1.2, 0x3d4757);
addBox( 8, 1.6, -3, 1.2, 3.2, 1.2, 0x3d4757);
addBox(-6, 1.4, -16, 1.2, 2.8, 1.2, 0x3d4757);
addBox( 6, 1.4, -16, 1.2, 2.8, 1.2, 0x3d4757);

// ---------- enemy dummy ----------
var enemy = new THREE.Group();
var body = new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,1.5,16),
                          new THREE.MeshStandardMaterial({ color:0xff6a5a, roughness:.8 }));
body.position.y = 0.75;
var head = new THREE.Mesh(new THREE.SphereGeometry(0.42,18,14),
                          new THREE.MeshStandardMaterial({ color:0xffb0a6, roughness:.7 }));
head.position.y = 1.7;
enemy.add(body); enemy.add(head);
scene.add(enemy);
var enemyState = { center:new THREE.Vector3(0,0,-9), range:6, phase:0, hitFlash:0, hitRadius:1.05 };
function relocateEnemy(){
  enemyState.center.set((Math.random()*2-1)*8, 0, -5 - Math.random()*11);
  enemyState.range = 3 + Math.random()*5;
  enemyState.phase = Math.random()*6.28;
}

// ---------- spears ----------
var spears = []; // { mesh, vel:THREE.Vector3, stuck:bool, life:number }
var spearGeo = new THREE.CylinderGeometry(0.045,0.02,1.4,8);
spearGeo.rotateX(Math.PI/2); // point along +Z (local), we orient to velocity
var spearMat = new THREE.MeshStandardMaterial({ color:0xe9e2c8, roughness:.5, metalness:.1 });
function spawnSpear(pos, vel){
  var m = new THREE.Mesh(spearGeo, spearMat);
  m.position.copy(pos);
  scene.add(m);
  var s = { mesh:m, vel:vel.clone(), stuck:false, life:0 };
  spears.push(s);
  while(spears.length > MAX_SPEARS){ var old=spears.shift(); scene.remove(old.mesh); }
}

// ---------- trajectory preview ----------
var TRAJ_MAX = 60;
var trajGeo = new THREE.BufferGeometry();
var trajPos = new Float32Array(TRAJ_MAX*3);
trajGeo.setAttribute('position', new THREE.BufferAttribute(trajPos, 3));
var trajMat = new THREE.PointsMaterial({ color:0xffd24a, size:0.16, sizeAttenuation:true, transparent:true, opacity:.9 });
var traj = new THREE.Points(trajGeo, trajMat);
traj.visible = false;
scene.add(traj);
var showTraj = true;

function updateTrajectory(origin, dir, speed){
  var p = origin.clone();
  var v = dir.clone().multiplyScalar(speed);
  var dt = 0.045, n=0;
  for(var i=0;i<TRAJ_MAX;i++){
    trajPos[n*3]=p.x; trajPos[n*3+1]=p.y; trajPos[n*3+2]=p.z; n++;
    v.y += SPEAR_GRAVITY*dt;
    p.addScaledVector(v, dt);
    if(p.y <= 0.05) break;            // hit ground
    if(hitAnyObstacle(p)) break;      // hit cover/pillar
  }
  trajGeo.setDrawRange(0, n);
  trajGeo.attributes.position.needsUpdate = true;
}

// ---------- player state ----------
var yaw = 0, pitch = 0;
var pos = new THREE.Vector3(0, EYE, 18);
var velY = 0, grounded = true;
var keys = {};
var moveInput = { x:0, y:0 }; // touch joystick, -1..1 (x=strafe, y=forward)

// attack state (shared desktop/touch)
var attackDown = false, attackStart = 0, wantJump = false;

function forwardDir(){ // full look direction incl. pitch
  var e = new THREE.Euler(pitch, yaw, 0, 'YXZ');
  return new THREE.Vector3(0,0,-1).applyEuler(e);
}
function committedCharge(now){ return attackDown && (now - attackStart) > TAP_MAX; }
function chargePower(held){ return Math.max(0, Math.min(1, (held - TAP_MAX)/(CHARGE_FULL - TAP_MAX))); }

function doThrow(power){
  var dir = forwardDir().normalize();
  var speed = THROW_MIN + (THROW_MAX-THROW_MIN)*power;
  var origin = pos.clone().addScaledVector(dir, 0.6);
  origin.y -= 0.1;
  spawnSpear(origin, dir.multiplyScalar(speed));
}
function doJab(){
  // short-range hitscan cone
  var dir = forwardDir().normalize();
  var toE = new THREE.Vector3().subVectors(enemyCenterWorld(), pos);
  var dist = toE.length();
  if(dist <= JAB_RANGE && dir.dot(toE.normalize()) >= JAB_DOT){ registerHit('JAB'); }
  flashCrosshair();
}
function endAttack(now){
  if(!attackDown) return;
  var held = now - attackStart;
  attackDown = false;
  if(held < TAP_MAX){ doJab(); }
  else { doThrow(chargePower(held)); }
}

// ---------- hit handling ----------
var hits = 0;
var hitsEl = document.getElementById('hits');
var hitpop = document.getElementById('hitpop');
var crosshair = document.getElementById('crosshair');
function enemyCenterWorld(){ return new THREE.Vector3(enemy.position.x, 1.1, enemy.position.z); }
function flashCrosshair(){ crosshair.classList.add('flash'); setTimeout(function(){ crosshair.classList.remove('flash'); }, 90); }
function registerHit(kind){
  hits++; hitsEl.textContent = 'Hits: '+hits;
  enemyState.hitFlash = 0.25;
  hitpop.textContent = kind==='JAB' ? 'JAB!' : 'HIT!';
  hitpop.style.opacity = '1';
  setTimeout(function(){ hitpop.style.opacity='0'; }, 220);
  flashCrosshair();
  relocateEnemy();
}

// ---------- collision helpers ----------
function hitAnyObstacle(p){
  for(var i=0;i<obstacles.length;i++){
    var b = obstacles[i].box;
    if(p.x>=b.min.x && p.x<=b.max.x && p.y>=b.min.y && p.y<=b.max.y && p.z>=b.min.z && p.z<=b.max.z) return true;
  }
  return false;
}
function resolvePlayer(){
  for(var i=0;i<obstacles.length;i++){
    var b = obstacles[i].box;
    // only resolve if player's vertical span overlaps the box
    if(pos.y - EYE > b.max.y || pos.y < b.min.y) continue;
    var cx = Math.max(b.min.x, Math.min(pos.x, b.max.x));
    var cz = Math.max(b.min.z, Math.min(pos.z, b.max.z));
    var dx = pos.x - cx, dz = pos.z - cz;
    var d2 = dx*dx + dz*dz;
    if(d2 < PLAYER_RADIUS*PLAYER_RADIUS){
      var d = Math.sqrt(d2) || 0.0001;
      var push = (PLAYER_RADIUS - d)/d;
      pos.x += dx*push; pos.z += dz*push;
    }
  }
}

// ---------- update loop ----------
var clock = new THREE.Clock();
var started = false;
function animate(){
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), 0.05);
  var now = performance.now()/1000;
  if(started) step(dt, now);
  renderer.render(scene, camera);
}
function step(dt, now){
  // ----- movement -----
  var e = new THREE.Euler(0, yaw, 0, 'YXZ');
  var fwd = new THREE.Vector3(0,0,-1).applyEuler(e);
  var right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
  var mv = new THREE.Vector3();
  if(isTouch){
    mv.addScaledVector(fwd, moveInput.y);
    mv.addScaledVector(right, moveInput.x);
  } else {
    if(keys['KeyW']) mv.add(fwd);
    if(keys['KeyS']) mv.addScaledVector(fwd,-1);
    if(keys['KeyD']) mv.add(right);
    if(keys['KeyA']) mv.addScaledVector(right,-1);
  }
  if(mv.lengthSq()>0){ mv.normalize().multiplyScalar(MOVE_SPEED*dt); pos.x+=mv.x; pos.z+=mv.z; }

  // jump + gravity
  if(wantJump && grounded){ velY = JUMP_SPEED; grounded=false; }
  wantJump = false;
  velY += GRAVITY*dt;
  pos.y += velY*dt;
  if(pos.y <= EYE){ pos.y = EYE; velY = 0; grounded = true; }
  resolvePlayer();

  camera.position.copy(pos);
  camera.rotation.set(pitch, yaw, 0, 'YXZ');

  // ----- charge / trajectory -----
  if(committedCharge(now) && showTraj){
    var held = now - attackStart;
    var power = chargePower(held);
    var speed = THROW_MIN + (THROW_MAX-THROW_MIN)*power;
    var dir = forwardDir().normalize();
    var origin = pos.clone().addScaledVector(dir,0.6); origin.y -= 0.1;
    updateTrajectory(origin, dir, speed);
    traj.visible = true;
    chargeWrap.classList.add('on');
    chargeFill.style.width = (power*100).toFixed(0)+'%';
  } else {
    traj.visible = false;
    chargeWrap.classList.remove('on');
  }

  // ----- spears -----
  for(var i=spears.length-1;i>=0;i--){
    var s = spears[i]; s.life += dt;
    if(!s.stuck){
      s.vel.y += SPEAR_GRAVITY*dt;
      s.mesh.position.addScaledVector(s.vel, dt);
      // orient to velocity
      var look = s.mesh.position.clone().add(s.vel);
      s.mesh.lookAt(look);
      // hit enemy?
      var ec = enemyCenterWorld();
      if(s.mesh.position.distanceTo(ec) < enemyState.hitRadius){ registerHit('THROW'); scene.remove(s.mesh); spears.splice(i,1); continue; }
      // stick to ground / obstacle
      if(s.mesh.position.y <= 0.05 || hitAnyObstacle(s.mesh.position)){ s.stuck=true; s.vel.set(0,0,0); }
    }
    if(s.life > 6){ scene.remove(s.mesh); spears.splice(i,1); }
  }

  // ----- enemy motion -----
  enemyState.phase += dt*1.1;
  enemy.position.x = enemyState.center.x + Math.sin(enemyState.phase)*enemyState.range;
  enemy.position.z = enemyState.center.z + Math.cos(enemyState.phase*0.6)*1.5;
  if(enemyState.hitFlash>0){
    enemyState.hitFlash -= dt;
    var f = enemyState.hitFlash>0?1:0;
    body.material.emissive = new THREE.Color(f?0x552200:0x000000);
  }
}

// ---------- DESKTOP input ----------
var overlay = document.getElementById('overlay');
var chargeWrap = document.getElementById('chargeWrap');
var chargeFill = document.getElementById('chargeFill');

if(!isTouch){
  var canvas = renderer.domElement;
  document.addEventListener('pointerlockchange', function(){
    // when unlocked mid-game, keep state; re-lock on click
  });
  window.addEventListener('mousemove', function(ev){
    if(document.pointerLockElement !== canvas) return;
    var mult = committedCharge(performance.now()/1000) ? AIM_SENS_MULT : 1;
    yaw   -= ev.movementX * LOOK_DESK * mult;
    pitch -= ev.movementY * LOOK_DESK * mult;
    pitch = Math.max(-1.45, Math.min(1.45, pitch));
  });
  window.addEventListener('mousedown', function(ev){
    if(document.pointerLockElement !== canvas) return;
    if(ev.button===0){ attackDown=true; attackStart=performance.now()/1000; }
  });
  window.addEventListener('mouseup', function(ev){
    if(document.pointerLockElement !== canvas) return;
    if(ev.button===0){ endAttack(performance.now()/1000); }
  });
  window.addEventListener('keydown', function(ev){
    keys[ev.code]=true;
    if(ev.code==='Space'){ wantJump=true; ev.preventDefault(); }
    if(ev.code==='KeyT'){ showTraj=!showTraj; }
  });
  window.addEventListener('keyup', function(ev){ keys[ev.code]=false; });
}

// ---------- TOUCH input (Scheme B) ----------
if(isTouch){
  var joyBase = document.getElementById('joyBase');
  var joyStick = document.getElementById('joyStick');
  var btnAttack = document.getElementById('btnAttack');
  var btnJump = document.getElementById('btnJump');
  document.querySelectorAll('.touchOnly').forEach(function(el){ el.style.display='flex'; });

  var moveId=null, moveOrigin={x:0,y:0};
  var lookId=null, lookLast={x:0,y:0};
  var atkId=null, atkMoved=0, atkLast={x:0,y:0};

  function onDown(e){
    var t = e.target;
    if(t===btnJump){ wantJump=true; e.preventDefault(); return; }
    if(t===btnAttack){
      atkId=e.pointerId; attackDown=true; attackStart=performance.now()/1000;
      atkMoved=0; atkLast.x=e.clientX; atkLast.y=e.clientY; e.preventDefault(); return;
    }
    if(e.clientX < window.innerWidth*0.5 && moveId===null){
      moveId=e.pointerId; moveOrigin.x=e.clientX; moveOrigin.y=e.clientY;
      joyBase.style.left=e.clientX+'px'; joyBase.style.top=e.clientY+'px';
      joyStick.style.left=e.clientX+'px'; joyStick.style.top=e.clientY+'px';
      joyBase.style.opacity='1'; joyStick.style.opacity='1';
    } else if(lookId===null){
      lookId=e.pointerId; lookLast.x=e.clientX; lookLast.y=e.clientY;
    }
  }
  function onMove(e){
    if(e.pointerId===moveId){
      var dx=e.clientX-moveOrigin.x, dy=e.clientY-moveOrigin.y;
      var max=55, len=Math.hypot(dx,dy);
      if(len>max){ dx*=max/len; dy*=max/len; }
      joyStick.style.left=(moveOrigin.x+dx)+'px'; joyStick.style.top=(moveOrigin.y+dy)+'px';
      moveInput.x = dx/max; moveInput.y = -dy/max;
    } else if(e.pointerId===lookId){
      var mx=e.clientX-lookLast.x, my=e.clientY-lookLast.y;
      yaw -= mx*LOOK_TOUCH; pitch -= my*LOOK_TOUCH;
      pitch=Math.max(-1.45,Math.min(1.45,pitch));
      lookLast.x=e.clientX; lookLast.y=e.clientY;
    } else if(e.pointerId===atkId){
      var ax=e.clientX-atkLast.x, ay=e.clientY-atkLast.y;
      atkMoved += Math.hypot(ax,ay);
      var mult = committedCharge(performance.now()/1000) ? AIM_SENS_MULT : 1;
      yaw -= ax*LOOK_TOUCH*mult; pitch -= ay*LOOK_TOUCH*mult;
      pitch=Math.max(-1.45,Math.min(1.45,pitch));
      atkLast.x=e.clientX; atkLast.y=e.clientY;
    }
  }
  function onUp(e){
    if(e.pointerId===moveId){ moveId=null; moveInput.x=0; moveInput.y=0; joyBase.style.opacity='0'; joyStick.style.opacity='0'; }
    else if(e.pointerId===lookId){ lookId=null; }
    else if(e.pointerId===atkId){
      atkId=null;
      var held = performance.now()/1000 - attackStart;
      attackDown=false;
      if(held<TAP_MAX && atkMoved<14){ doJab(); }
      else { doThrow(chargePower(held)); }
    }
  }
  window.addEventListener('pointerdown', onDown, {passive:false});
  window.addEventListener('pointermove', onMove, {passive:false});
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);
}

// ---------- start / resize / hints ----------
var keysEl = document.getElementById('keys');
var modeEl = document.getElementById('mode');
var hintEl = document.getElementById('hint');
if(isTouch){
  keysEl.innerHTML = '<b>Left thumb</b> — drag to move<br><b>Right side</b> — drag to look<br><b>THROW/JAB button</b> — tap = jab, hold = charge &amp; throw (drag while holding to aim)<br><b>JUMP button</b> — jump';
  modeEl.textContent = 'touch mode';
  hintEl.textContent = 'Hold THROW to charge an arc over the wall. Tap it up close to jab.';
} else {
  keysEl.innerHTML = '<b>WASD</b> — move &nbsp; <b>Mouse</b> — look &nbsp; <b>Space</b> — jump<br><b>Left click</b> — quick click = jab, hold = charge &amp; throw<br><b>T</b> — toggle trajectory preview';
  modeEl.textContent = 'desktop mode (click to capture mouse)';
  hintEl.textContent = 'Hold left-click to charge an arced throw over the wall. Quick-click up close to jab.';
}

document.getElementById('goBtn').addEventListener('click', function(){
  overlay.style.display='none';
  started = true;
  if(!isTouch){ renderer.domElement.requestPointerLock(); }
});
// desktop: clicking the canvas re-locks the pointer if it was released (Esc)
renderer.domElement.addEventListener('click', function(){
  if(!isTouch && started && document.pointerLockElement !== renderer.domElement){
    renderer.domElement.requestPointerLock();
  }
});

window.addEventListener('resize', function(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

relocateEnemy();
animate();
})();
</script>
</body>
</html>
